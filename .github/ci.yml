name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Chromium is only needed by perf/capture scripts, not by CI checks.
          PUPPETEER_SKIP_DOWNLOAD: '1'

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke test
        run: npm run smoke

# Deploys are handled by Fly.io's GitHub integration (repo connected in the
# Fly dashboard), so there is no deploy job here. To switch to CI-gated
# deploys instead, disconnect the Fly integration and add a job that runs
# `flyctl deploy --remote-only` with a FLY_API_TOKEN secret, gated on the
# checks job — see specs/plans/02-hosting-and-cicd.md.
