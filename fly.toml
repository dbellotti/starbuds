# Fly.io app configuration — https://fly.io/docs/reference/configuration/
#
# `app` must match the app you created with `fly apps create <name>`; the demo
# is served at https://<name>.fly.dev. Set `primary_region` to the region
# closest to your play group (https://fly.io/docs/reference/regions/), e.g.
# sjc/lax/ord/iad for the US, ams/fra for Europe.
#
# IMPORTANT: this app must run on exactly ONE machine. The game server keeps
# the entire world in memory (one GameWorld per process, no rooms, no shared
# state), so two machines means two parallel universes — Fly's proxy will
# round-robin players between them and nobody ends up in the same match.
# Fly creates TWO machines by default on the first deploy (its HA default);
# fix an existing app with:
#
#   fly scale count 1 -a starbuds
#
# and verify with `fly status`. Later deploys update machines in place and
# won't add more. If the app is ever recreated, run the first deploy with
# `fly deploy --ha=false`. Note that `min_machines_running` below only
# controls how many machines stay AWAKE, not how many EXIST.

app = "starbuds"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 7777
  force_https = true
  # Suspend the machine when nobody is connected (websocket connections count
  # as activity) and wake it on the next request, so idle time costs ~nothing.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
